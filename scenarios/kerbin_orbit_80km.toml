instance_id = "kerbin_orbit_80km_fixed_rocket_v0"
benchmark_version = "0.1.0"
body = "Kerbin"
vessel_name = "Kerbal 1"
[target_orbit]
altitude_m = 80000
stable_periapsis_min_m = 70000

[scoring]
cleared_tower_m = 100
reached_10km_m = 10000
reached_space_m = 70000
# Partial-flight credit is continuous: ascent reaches 20 points at 70 km,
# then raising periapsis reaches another 30 points at a stable 70 km orbit.
ascent_points = 20
circularization_points = 30
stable_orbit_points = 10
orbit_precision_points = 20
# Full credit means both apses average within roughly a few hundred metres.
# Precision then fades to zero at 20 km average orbit error.
orbit_precision_tolerance_m = 300
orbit_precision_zero_credit_error_m = 20000
reserve_delta_v_points = 20
# A clean manual ascent leaves about 710 m/s in the fixed craft.
manual_baseline_delta_v_m_s = 710
# 100 is a clean manual-grade run. More efficient qualifying orbits earn up
# to 20 bonus points, reaching the 120-point maximum at 1,000 m/s remaining.
efficiency_bonus_points = 20
efficiency_bonus_delta_v_m_s = 1000
